<div class="row" id="statCards">
    <div class="col-md-6 col-lg-4 mb-4">
        <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2"><i class="bi bi-calculator"></i> Net Worth</h6>
            <h2 class="text-success mb-0" id="netWorth">
                <span class="spinner-border spinner-border-sm text-success"></span>
            </h2>
        </div>
    </div>
    <div class="col-md-6 col-lg-4 mb-4">
        <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2"><i class="bi bi-fire"></i> Monthly Spend</h6>
            <h2 class="text-primary mb-0" id="monthlyBurn">
                <span class="spinner-border spinner-border-sm text-primary"></span>
            </h2>
        </div>
    </div>
    <div class="col-md-6 col-lg-4 mb-4">
        <div class="card stat-card p-3">
            <h6 class="text-secondary mb-2"><i class="bi bi-graph-up"></i> Savings Rate</h6>
            <h2 class="text-info mb-0" id="savingsRate">
                <span class="spinner-border spinner-border-sm text-info"></span>
            </h2>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 mb-4">
        <div class="card p-4 h-100">
            <h5 class="mb-3"><i class="bi bi-lightbulb text-warning"></i> Quick Insights</h5>
            <ul class="list-unstyled mb-0" id="quickInsights">
                <li class="text-muted">Loading…</li>
            </ul>
        </div>
    </div>
    <div class="col-lg-6 mb-4">
        <div class="card p-4 h-100">
            <h5 class="mb-3"><i class="bi bi-pie-chart"></i> Budget Health</h5>
            <div id="budgetHealth">
                <p class="text-muted">Loading…</p>
            </div>
        </div>
    </div>
</div>

<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0"><i class="bi bi-clock-history"></i> Recent Transactions</h5>
        <button class="btn btn-sm btn-outline-primary" id="viewAllTx">View All</button>
    </div>
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th></tr>
            </thead>
            <tbody id="recentTransactions">
                <tr><td colspan="4" class="text-center text-muted">Loading…</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
window.initDashboard = async function () {
    // Fix: fetch overview and monthly summary in parallel.
    const [overviewRes, monthlyRes] = await Promise.allSettled([
        apiFetch('/insights/overview'),
        apiFetch('/insights/summary/monthly'),
    ]);

    const overview = overviewRes.status === 'fulfilled' ? overviewRes.value?.data : null;
    const monthly  = monthlyRes.status  === 'fulfilled' ? monthlyRes.value?.data  : null;

    renderStats(overview, monthly);
    renderInsights(overview);
    renderBudgetHealth(overview);
    renderRecentTx(overview);

    document.getElementById('viewAllTx').onclick = () => loadPage('transactions');
};

function renderStats(overview, monthly) {
    document.getElementById('netWorth').textContent =
        overview ? formatCurrency(overview.net_worth) : '—';

    document.getElementById('monthlyBurn').textContent =
        overview ? formatCurrency(overview.monthly_burn) : '—';

    document.getElementById('savingsRate').textContent =
        monthly ? `${(monthly.savings_rate || 0).toFixed(1)}%` : '—';
}

function renderInsights(overview) {
    const list = document.getElementById('quickInsights');
    if (!overview) {
        list.innerHTML = '<li class="text-muted">Could not load insights.</li>';
        return;
    }
    const insights = overview.quick_insights || [];
    list.innerHTML = insights.length
        ? insights.map(i =>
            `<li class="mb-2">
                <i class="bi bi-chat-right-quote text-success me-2"></i>
                ${escapeHtml(i)}
             </li>`
          ).join('')
        : '<li class="text-muted">Add transactions to see insights.</li>';
}

function renderBudgetHealth(overview) {
    const container = document.getElementById('budgetHealth');
    if (!overview) {
        container.innerHTML = '<p class="text-muted">Could not load budgets.</p>';
        return;
    }
    const budgets = overview.budget_health || [];
    if (!budgets.length) {
        container.innerHTML = '<p class="text-muted">No budgets yet. <a href="#" onclick="loadPage(\'budgets\')">Create one!</a></p>';
        return;
    }
    container.innerHTML = budgets.map(b => {
        const pct = Math.min(b.percentage || 0, 100);
        return `
            <div class="mb-3">
                <div class="d-flex justify-content-between small mb-1">
                    <span>${escapeHtml(b.category_name)}</span>
                    <span class="text-muted">${formatCurrency(b.spent)} / ${formatCurrency(b.budget)}</span>
                </div>
                <div class="progress" style="height:8px;">
                    <div class="progress-bar ${pct > 90 ? 'bg-danger' : pct > 70 ? 'bg-warning' : 'bg-success'}"
                         style="width:${pct.toFixed(1)}%"></div>
                </div>
            </div>`;
    }).join('');
}

function renderRecentTx(overview) {
    const tbody = document.getElementById('recentTransactions');
    if (!overview) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted">Could not load transactions.</td></tr>';
        return;
    }
    const txs = (overview.recent_transactions || []).slice(0, 5);
    tbody.innerHTML = txs.length
        ? txs.map(tx => `
            <tr>
                <td class="text-nowrap">${formatDate(tx.transaction_date)}</td>
                <td>${escapeHtml(tx.description) || '—'}</td>
                <td>${escapeHtml(tx.category?.name) || '<span class="text-muted">Uncategorized</span>'}</td>
                <td class="${tx.type === 'income' ? 'amount-positive' : 'amount-negative'} text-nowrap">
                    ${tx.type === 'income' ? '+' : '−'} ${formatCurrency(Math.abs(tx.amount))}
                </td>
            </tr>`
          ).join('')
        : '<tr><td colspan="4" class="text-center text-muted py-4">No transactions yet.</td></tr>';
}
</script>
