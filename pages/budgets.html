<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0"><i class="bi bi-pie-chart"></i> Budgets</h4>
        <button class="btn btn-sm btn-success" id="addBudgetBtn">
            <i class="bi bi-plus-lg"></i> Create Budget
        </button>
    </div>

    <div id="budgetsList" class="row">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-success"></div>
        </div>
    </div>
</div>

<!-- Create Budget Modal -->
<div class="modal fade" id="budgetModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">
            <div class="modal-header bg-success bg-opacity-10 border-0">
                <h5 class="modal-title"><i class="bi bi-pie-chart me-2"></i>Create Budget</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="budgetError" class="alert alert-danger py-2 small d-none"></div>

                <label class="form-label small fw-semibold">Category *</label>
                <select id="budgetCategory" class="form-select mb-3">
                    <option value="">Select a category</option>
                </select>

                <label class="form-label small fw-semibold">Budget Amount (KES) *</label>
                <input type="number" step="0.01" min="1" id="budgetAmount" class="form-control mb-3" placeholder="e.g. 15000">

                <label class="form-label small fw-semibold">Period</label>
                <select id="budgetPeriod" class="form-select">
                    <option value="monthly">Monthly</option>
                    <option value="weekly">Weekly</option>
                </select>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" id="confirmBudgetBtn">Create Budget</button>
            </div>
        </div>
    </div>
</div>

<script>
window.initBudgets = async function () {
    // Fix: load budgets and categories in parallel (single /categories call).
    // Previously loadBudgets() and loadBudgetCategories() each called /categories.
    const [budgetsRes, catsRes] = await Promise.all([
        apiFetch('/budgets').catch(e => ({ data: [], _err: e })),
        apiFetch('/categories').catch(e => ({ data: [], _err: e })),
    ]);

    renderBudgets(budgetsRes.data || []);
    populateCategorySelect(catsRes.data || []);

    document.getElementById('addBudgetBtn').onclick = () => {
        document.getElementById('budgetAmount').value = '';
        document.getElementById('budgetError').classList.add('d-none');
        new bootstrap.Modal(document.getElementById('budgetModal')).show();
    };

    document.getElementById('confirmBudgetBtn').onclick = createBudget;
};

function renderBudgets(budgets) {
    const container = document.getElementById('budgetsList');

    if (!budgets.length) {
        container.innerHTML = `
            <div class="col-12 text-center py-5 text-muted">
                <i class="bi bi-pie-chart fs-1 d-block mb-3 opacity-25"></i>
                No budgets yet. Create your first budget!
            </div>`;
        return;
    }

    container.innerHTML = budgets.map(b => {
        const pct     = b.amount > 0 ? (b.spent / b.amount) * 100 : 0;
        const barCls  = pct > 90 ? 'bg-danger' : pct > 70 ? 'bg-warning' : 'bg-success';
        const textCls = pct > 90 ? 'text-danger' : 'text-muted';
        return `
            <div class="col-md-6 mb-3">
                <div class="card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="fw-bold mb-0">${escapeHtml(b.category?.name || 'Category')}</h6>
                        <span class="badge bg-secondary">${escapeHtml(b.period)}</span>
                    </div>
                    <div class="progress mb-2" style="height:10px;">
                        <div class="progress-bar ${barCls}" style="width:${Math.min(pct, 100).toFixed(1)}%"></div>
                    </div>
                    <div class="d-flex justify-content-between small ${textCls}">
                        <span>Spent: ${formatCurrency(b.spent)}</span>
                        <span>${pct.toFixed(0)}% of ${formatCurrency(b.amount)}</span>
                    </div>
                </div>
            </div>`;
    }).join('');
}

function populateCategorySelect(categories) {
    const expenseOnly = categories.filter(c => c.type === 'expense');
    const select = document.getElementById('budgetCategory');
    select.innerHTML = '<option value="">Select a category</option>' +
        expenseOnly.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('');
}

async function createBudget() {
    const btn        = document.getElementById('confirmBudgetBtn');
    const errBox     = document.getElementById('budgetError');
    const categoryId = document.getElementById('budgetCategory').value;
    const amount     = parseFloat(document.getElementById('budgetAmount').value);
    const period     = document.getElementById('budgetPeriod').value;

    errBox.classList.add('d-none');

    if (!categoryId) {
        errBox.textContent = 'Please select a category.';
        errBox.classList.remove('d-none');
        return;
    }
    if (isNaN(amount) || amount <= 0) {
        errBox.textContent = 'Please enter a valid budget amount.';
        errBox.classList.remove('d-none');
        return;
    }

    // Fix: disable button to prevent double-submit.
    const originalText = btn.innerHTML;
    setButtonLoading(btn, true);
    try {
        await apiFetch('/budgets', {
            method: 'POST',
            body: JSON.stringify({
                category_id: categoryId,
                amount,
                period,
                start_date: new Date().toISOString(),
                end_date:   new Date(Date.now() + 30 * 24 * 60 * 60 * 1000).toISOString(),
            }),
        });
        bootstrap.Modal.getInstance(document.getElementById('budgetModal')).hide();
        showToast('Budget created!', 'success');

        // Reload only the list, not the whole page.
        const budgetsRes = await apiFetch('/budgets');
        renderBudgets(budgetsRes.data || []);
    } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('d-none');
    } finally {
        setButtonLoading(btn, false, originalText);
    }
}
</script>
