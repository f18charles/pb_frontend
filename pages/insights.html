<div class="card p-4 mb-4">
    <h4><i class="bi bi-graph-up"></i> Spending Insights</h4>
    <p class="text-muted">Based on your last 90 days of transactions</p>
    
    <div class="row">
        <div class="col-md-6 mb-4">
            <canvas id="categoryChart" style="max-height: 300px;"></canvas>
        </div>
        <div class="col-md-6">
            <h6>📊 Spending Patterns</h6>
            <div id="patterns"></div>
            <h6 class="mt-3">⚠️ Unusual Transactions</h6>
            <div id="anomalies"></div>
        </div>
    </div>
    
    <h6 class="mt-3">💡 Recommendations</h6>
    <div id="recommendations"></div>
</div>

<script>
let insightsChart = null;

window.initInsights = async function() {
    try {
        const response = await apiFetch('/insights/spending?days=90');
        const data = response.data;
        
        // Category chart
        const topCats = data.top_categories || [];
        if (topCats.length) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if (insightsChart) insightsChart.destroy();
            insightsChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: topCats.map(c => c.category_name),
                    datasets: [{
                        data: topCats.map(c => c.total_spent),
                        backgroundColor: ['#2c6e2f', '#7bc5d9', '#e9b35f', '#6c9e6f', '#c96b3a']
                    }]
                }
            });
        } else {
            document.getElementById('categoryChart').parentElement.innerHTML = '<p class="text-muted">No spending data available</p>';
        }
        
        // Patterns
        const patterns = data.spending_patterns || {};
        document.getElementById('patterns').innerHTML = `
            <p><strong>Most active day:</strong> ${patterns.most_active_day || 'N/A'}</p>
            <p><strong>Peak spending hour:</strong> ${patterns.peak_hour || 'N/A'}:00</p>
            <p><strong>Weekday avg:</strong> ${formatCurrency(patterns.avg_weekday_spend || 0)}</p>
            <p><strong>Weekend avg:</strong> ${formatCurrency(patterns.avg_weekend_spend || 0)}</p>
        `;
        
        // Anomalies
        const anomalies = data.anomalies || [];
        document.getElementById('anomalies').innerHTML = anomalies.length ? 
            anomalies.map(a => `<div class="small mb-2">⚠️ ${formatDate(a.date)}: ${a.description} - ${formatCurrency(a.amount)} (expected ~${formatCurrency(a.expected_amount)})</div>`).join('') :
            '<p class="text-muted">No unusual spending detected</p>';
        
        // Recommendations
        const recs = data.recommendations || [];
        document.getElementById('recommendations').innerHTML = recs.length ?
            `<ul class="list-unstyled">${recs.map(r => `<li class="mb-2"><i class="bi bi-lightbulb text-warning me-2"></i>${r}</li>`).join('')}</ul>` :
            '<p class="text-muted">Add more transactions for personalized recommendations</p>';
            
    } catch (err) {
        console.error('Insights error:', err);
        document.getElementById('patterns').innerHTML = `<p class="text-danger">Error loading insights: ${err.message}</p>`;
    }
};
</script>
