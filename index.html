<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piggy Bank — Smart Personal Finance</title>

    <!-- Bootstrap CSS + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Loading Overlay
     Fix: ID was "loadingOverlay" in HTML but utils.js looked for "globalLoading" — now consistent. -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="spinner-border text-success mb-3" style="width:3.5rem;height:3.5rem;" role="status"></div>
    <h4 class="text-success"><i class="bi bi-piggy-bank-fill me-2"></i>Piggy Bank</h4>
    <p class="text-muted mt-2">Loading your finances…</p>
    <div class="render-warning mt-3">
        <i class="bi bi-cloud-upload"></i> <strong>Render Free Tier Notice</strong><br>
        Backend may take 20–40 seconds to wake up on first request. Please wait!
    </div>
</div>

<!-- Main App Shell (hidden until auth confirmed) -->
<div id="app" style="display:none;">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-3 px-md-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" id="logoLink">
                <i class="bi bi-piggy-bank-fill me-2"></i>Piggy Bank
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-2">
                    <li class="nav-item">
                        <span class="text-white-50 small" id="userEmail"></span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-sm btn-outline-light" id="logoutBtn">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-3 px-md-4 mt-4">
        <div class="row g-4">

            <!-- Sidebar -->
            <div class="col-md-3 col-lg-2">
                <div class="sidebar-menu">
                    <a href="#" class="sidebar-link active" data-page="dashboard">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                    <a href="#" class="sidebar-link" data-page="transactions">
                        <i class="bi bi-receipt"></i> Transactions
                    </a>
                    <a href="#" class="sidebar-link" data-page="budgets">
                        <i class="bi bi-pie-chart"></i> Budgets
                    </a>
                    <a href="#" class="sidebar-link" data-page="goals">
                        <i class="bi bi-trophy"></i> Goals
                    </a>
                    <a href="#" class="sidebar-link" data-page="insights">
                        <i class="bi bi-graph-up"></i> Insights
                    </a>
                    <a href="#" class="sidebar-link" data-page="categories">
                        <i class="bi bi-tags"></i> Categories
                    </a>
                </div>
            </div>

            <!-- Dynamic Page Content
                 Fix: single container instead of 6 hidden divs. router.js fetches
                 and renders the active page HTML fragment into #pageContainer. -->
            <div class="col-md-9 col-lg-10">
                <div id="pageContainer"></div>
            </div>

        </div>
    </div>

    <div class="footer">
        <i class="bi bi-database"></i>
        Backend on Render Free Tier — first request may take 20–40 s to wake up
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!--
    Script load order matters:
      1. utils.js   — formatCurrency, escapeHtml, showToast, showLoading, setButtonLoading
      2. api.js     — Auth singleton, apiFetch, apiLogin, apiRegister, apiLogout
      3. router.js  — loadPage
      4. app.js     — initApp, showAuthModal (calls all of the above)

    Fix: previously api.js / utils.js / router.js / app.js were never loaded
    (no <script src="..."> tags); all logic was crammed into index.html's
    inline <script> block, duplicating and conflicting with the JS files.
-->
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/router.js"></script>
<script src="js/app.js"></script>

</body>
</html>
